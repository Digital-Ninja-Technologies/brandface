<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BrandFace Media — Done-for-you growth for law firms</title>
    <meta name="description" content="A done-for-you growth engine built exclusively for ambitious law firms: content, paid ads, and automation. 10 qualified consultations in 90 days, guaranteed." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="" />
    <link href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;500;600;700;800;900&family=Libre+Caslon+Display&family=Spectral:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet" />
    <script>
      (function () {
        try {
          var saved = localStorage.getItem('bf-theme');
          document.documentElement.dataset.theme = saved === 'dark' ? 'dark' : 'light';
        } catch (e) {
          document.documentElement.dataset.theme = 'light';
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
